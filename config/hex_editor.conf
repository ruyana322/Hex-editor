# Hex Editor Configuration
# ~/.config/hex_editor/config

[general]
# Backup on save (true/false)
backup_on_save=true

# Maximum file size untuk full scan (in MB)
max_scan_size=500

# Enable debug mode (true/false)
debug=false

[colors]
# Enable colored output
enable_colors=true

# Color theme (dark/light)
theme=dark

[performance]
# Chunk size untuk reading large files (in bytes)
chunk_size=8192

# Memory limit untuk file analysis (in MB)
memory_limit=256

# Timeout untuk operations (in seconds)
timeout=30

[paths]
# Backup directory (leave empty untuk same as original)
backup_dir=

# Report export directory
report_dir=./reports

# Temp directory
temp_dir=/tmp

[scanning]
# Limit scan size untuk large files (in MB)
scan_limit=1

# Detect video format (true/false)
auto_detect_format=true

# Check corruption (true/false)
check_corruption=true

[repair]
# Enable auto repair attempts
auto_repair=false

# Keep original after repair
keep_original=true

# Use ffmpeg untuk repair
use_ffmpeg=true
